<!DOCTYPE html>
<html>
<head>
    <title>All Tickets</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <h2>📋 All Customer Tickets</h2>
    <table border="1" width="100%" cellpadding="10">
        <tr>
            <th>Ticket ID</th>
            <th>Name</th>
            <th>Contact</th>
            <th>Message</th>
            <th>Category</th>
            <th>Date</th>
            <th>Priority</th>
            <th>Sentiment</th>
            <th>Solution</th>
            <th>Action</th>
        </tr>
        {% for t in tickets %}
        <tr>
            <td>{{ t[0] }}</td>
            <td>{{ t[1] }}</td>
            <td>{{ t[2] }}</td>
            <td>{{ t[3] }}</td>
            <td>{{ t[4] }}</td>
            <td>{{ t[5] }}</td>
            <td>{{ t[6] }}</td>
            <td>{{ t[7] }}</td>
            <td>{{ t[8] }}</td>
            <td><a href="/solve/{{ t[0] }}">Add Solution</a></td>
        </tr>
        {% endfor %}
    </table>
</div>
</body>
</html>
